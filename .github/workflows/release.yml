name: Release

# Publishes to npm when a version tag (e.g. v0.1.0) is pushed.
# Provenance (SLSA build attestation) is emitted automatically via package.json
# publishConfig.provenance + the id-token permission below.
#
# One-time setup: create an npm granular automation token and add it as the
# repository secret NPM_TOKEN. The repository must be public for provenance.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  # Re-run the full coverage + integration gate on the tagged commit before publishing. prepublishOnly
  # only runs check (unit) + build + lint:publish + api:check, so without this a tag pushed from a
  # commit that never passed CI could publish while skipping the coverage thresholds and the real-
  # Postgres integration / concurrency / fault suites. The ubuntu runner ships Docker, so
  # testcontainers-backed integration tests run here just like in ci.yml.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22.19.0"
          cache: npm

      - run: npm ci

      # The Prisma adapter e2e suite self-skips without a generated client, which would drop coverage
      # below threshold — generate it first (mirrors ci.yml).
      - name: Generate Prisma client
        run: npm run test:prisma:gen

      - name: Test (coverage + integration)
        run: npm run test:coverage

  publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22.19.0"
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Fail early if the pushed tag does not match the package.json version,
      # so a mistyped tag can never publish the wrong version.
      - name: Verify tag matches package version
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "Tag $GITHUB_REF_NAME ($tag) does not match package.json version $pkg" >&2
            exit 1
          fi

      # prepublishOnly runs check + build + lint:publish + api:check before publishing.
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
