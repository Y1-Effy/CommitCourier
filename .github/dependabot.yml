version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Group devDependencies into a single PR to reduce review overhead.
      dev-dependencies:
        dependency-type: development
    ignore:
      # typescript 6 is rejected by typescript-eslint's peer range (>=4.8.4 <6.0.0), which would
      # break type-aware linting. Hold the major until typescript-eslint ships TypeScript 6 support.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
